<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baobab Capital — LuSE Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9;
  --muted: #8b949e; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
  --gold: #d2991d; --accent: #1f6feb;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
.header { background:var(--card); border-bottom:1px solid var(--border); padding:0.5rem 2rem; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; height:3.5rem; }
.header h1 { font-size:1.15rem; display:flex; align-items:center; gap:0.5rem; }
.header .logo-wordmark { display:flex; flex-direction:column; }
.header .logo-wordmark .baobab { color:var(--gold); font-weight:800; font-size:1.15rem; letter-spacing:-0.5px; line-height:1; }
.header .logo-wordmark .capital { color:var(--text); font-weight:600; font-size:0.85rem; letter-spacing:2px; line-height:1; }
.header .logo-wordmark .tagline { color:var(--muted); font-size:0.55rem; font-weight:400; letter-spacing:0.5px; margin-top:1px; }
.header .logo-icon { width:28px; height:28px; }
.controls { display:flex; gap:0.75rem; align-items:center; }
.status { font-size:0.78rem; color:var(--muted); }
.dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; }
.dot.live { background:var(--green); }
.btn { background:var(--accent); color:white; border:none; padding:0.35rem 0.85rem; border-radius:6px; cursor:pointer; font-size:0.8rem; }
.btn:hover { opacity:0.85; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-sm { padding:0.2rem 0.5rem; font-size:0.7rem; }

.hero { margin:1rem 2rem; display:grid; grid-template-columns:1.2fr 1fr 1fr; gap:1rem; align-items:stretch; }
.hero-col { display:flex; flex-direction:column; gap:1rem; }
.hero-col > *:last-child { margin-top: auto; }
@media (max-width:900px) { .hero { grid-template-columns:1fr 1fr; } }
.hero-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.25rem; }
.hero-card.full-width { grid-column:1/-1; }

/* === CURRENCY CARD === */
.currency-card { background:linear-gradient(135deg,#0d1a2d,#0d1117); border:1px solid var(--border); border-radius:10px; padding:0.85rem; }
.currency-card .cc-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.5rem; }
.currency-card .cc-header h3 { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.currency-card .cc-header .cc-source { font-size:0.55rem; color:var(--muted); }
.currency-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.25rem; }
.currency-item { background:rgba(31,111,235,0.04); border-radius:5px; padding:0.35rem 0.4rem; text-align:center; }
.currency-item .cc-flag { font-size:1rem; margin-bottom:0.05rem; }
.currency-item .cc-code { font-size:0.55rem; color:var(--muted); font-weight:600; }
.currency-item .cc-rate { font-size:0.85rem; font-weight:700; color:var(--text); }
.currency-item .cc-move { font-size:0.55rem; font-weight:600; margin-top:0.05rem; }
.cc-move.up { color:var(--green); }
.cc-move.down { color:var(--red); }
.currency-trend { margin-top:0.5rem; padding-top:0.4rem; border-top:1px solid var(--border); font-size:0.6rem; color:var(--muted); line-height:1.35; }
.currency-trend strong { color:var(--gold); }

/* === SENTIMENT METER === */
.sentiment-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:0.85rem; text-align:center; }
.sentiment-card h3 { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.5rem; }
.sentiment-gauge { position:relative; width:100%; height:14px; border-radius:7px; margin-bottom:0.35rem; background:rgba(48,54,61,0.5); }
.sentiment-gauge .gauge-fill { height:100%; border-radius:7px; transition:width 0.6s; }
.sentiment-labels { display:flex; justify-content:space-between; font-size:0.5rem; color:var(--muted); margin-bottom:0.35rem; }
.sentiment-score { font-size:1.3rem; font-weight:800; }
.sentiment-verdict { font-size:0.62rem; font-weight:600; margin-top:0.1rem; }

/* === EARNINGS CALENDAR === */
.calendar-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:0.85rem; }
.calendar-card h3 { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.4rem; }
.cal-item { display:flex; align-items:center; gap:0.35rem; padding:0.28rem 0; border-bottom:1px solid var(--border); font-size:0.66rem; }
.cal-item:last-child { border-bottom:none; }
.cal-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.cal-dot.earnings { background:var(--green); }
.cal-dot.dividend { background:var(--gold); }
.cal-dot.event { background:var(--blue); }
.cal-date { font-size:0.58rem; color:var(--muted); width:36px; flex-shrink:0; }
.cal-ticker { font-weight:700; color:var(--blue); width:44px; flex-shrink:0; }
.cal-desc { flex:1; color:var(--text); font-size:0.63rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.label-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.5rem; }
.label-row h3 { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.date { font-size:0.72rem; color:var(--muted); }
.lasi { font-size:2.2rem; font-weight:700; color:var(--blue); }
.lasi-sub { font-size:0.8rem; color:var(--muted); margin-top:0.2rem; }
.condition { display:inline-block; padding:0.15rem 0.6rem; border-radius:10px; font-size:0.72rem; font-weight:600; margin-left:0.5rem; }
.condition-flat { background:rgba(139,148,158,0.15); color:var(--muted); }
.condition-up { background:rgba(63,185,80,0.15); color:var(--green); }
.condition-down { background:rgba(248,81,73,0.15); color:var(--red); }
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.75rem; margin-top:1rem; }
.stat-item { text-align:center; padding:0.6rem; background:rgba(31,111,235,0.05); border-radius:8px; }
.stat-item .val { font-size:1.15rem; font-weight:700; }
.stat-item .lbl { font-size:0.65rem; color:var(--muted); margin-top:0.15rem; }
.mover-row { display:flex; justify-content:space-between; padding:0.35rem 0; border-bottom:1px solid var(--border); font-size:0.8rem; }
.mover-row:last-child { border-bottom:none; }
.mover-row .t { font-weight:600; width:60px; }
.mover-row .n { flex:1; color:var(--muted); font-size:0.7rem; }
.mover-row .p { width:60px; text-align:right; }
.mover-row .c { width:50px; text-align:right; font-weight:600; }

.section-header { display:flex; justify-content:space-between; align-items:center; margin:0 2rem 0.5rem; }
.section-header h3 { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.filters { display:flex; gap:0.4rem; }
.filters .btn-sm { padding:0.2rem 0.6rem; font-size:0.7rem; background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; cursor:pointer; transition:all 0.15s; }`n.filters .btn-sm:hover { border-color:var(--blue); color:var(--text); }`n.filters .btn-sm.active { background:var(--accent); color:white; border-color:var(--accent); }
.ticker-table { margin:0 2rem 1rem; background:var(--card); border:1px solid var(--border); border-radius:8px; overflow-x:auto; }
.ticker-table table { width:100%; border-collapse:collapse; font-size:0.78rem; }
.ticker-table th { padding:0.5rem 0.6rem; text-align:left; color:var(--muted); font-weight:500; font-size:0.7rem; border-bottom:1px solid var(--border); background:rgba(22,27,34,0.5); cursor:pointer; }
.ticker-table th.num { text-align:right; }`n.ticker-table td { padding:0.45rem 0.6rem; border-bottom:1px solid var(--border); }`n.ticker-table td.num { text-align:right; font-variant-numeric:tabular-nums; }
.ticker-table tr:hover { background:rgba(31,111,235,0.05); cursor:pointer; }
.ticker-link { color:var(--blue); font-weight:600; }
.pos { color:var(--green); }
.neg { color:var(--red); }
.muted { color:var(--muted); }
.zero-vol { opacity:0.4; }

/* === BREAKING NEWS TICKER === */
.breaking-ticker { background:linear-gradient(90deg,#1a0a00,#2d1600,#1a0a00); border-bottom:2px solid var(--gold); overflow:hidden; position:sticky; top:3.5rem; z-index:99; display:flex; align-items:stretch; }
.breaking-label { background:var(--gold); color:#000; font-weight:800; font-size:0.65rem; text-transform:uppercase; padding:0.25rem 0.7rem; display:flex; align-items:center; letter-spacing:1px; white-space:nowrap; flex-shrink:0; z-index:2; }
.breaking-label .pulse { display:inline-block; width:6px; height:6px; border-radius:50%; background:#ff0000; margin-right:4px; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
.ticker-wrap { display:flex; align-items:center; white-space:nowrap; overflow:hidden; flex:1; min-width:0; }
.ticker-track { display:flex; animation:scroll 80s linear infinite; }
.ticker-track:hover { animation-play-state:paused; }
@keyframes scroll { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
.ticker-item { display:inline-flex; align-items:center; gap:0.4rem; padding:0.35rem 1.5rem; font-size:0.73rem; color:var(--text); border-right:1px solid rgba(210,153,29,0.25); }
.ticker-item .t-cat { font-size:0.55rem; font-weight:700; text-transform:uppercase; padding:0.1rem 0.35rem; border-radius:3px; }
.ticker-item .t-cat.tcat-market { background:rgba(88,166,255,0.2); color:var(--blue); }
.ticker-item .t-cat.tcat-macro { background:rgba(210,153,29,0.2); color:var(--gold); }
.ticker-item .t-cat.tcat-corporate { background:rgba(63,185,80,0.2); color:var(--green); }
.ticker-item .t-cat.tcat-ipo { background:rgba(188,140,255,0.2); color:#bc8cff; }
.ticker-item .t-cat.tcat-commodities { background:rgba(248,81,73,0.2); color:var(--red); }
.ticker-item .t-cat.tcat-energy { background:rgba(255,165,0,0.2); color:#ffa500; }
.ticker-item .t-cat.tcat-mining { background:rgba(139,148,158,0.2); color:var(--muted); }
.ticker-item .t-tickers { font-size:0.6rem; color:var(--gold); }
.ticker-time { font-size:0.55rem; color:var(--muted); margin-left:0.3rem; }

/* === CHART === */
.chart-wrap { margin:0.75rem 0; background:rgba(0,0,0,0.2); border-radius:8px; padding:0.5rem; }
.chart-wrap canvas { width:100% !important; height:280px !important; }
.chart-periods { display:flex; gap:0.25rem; margin-bottom:0.5rem; }
.chart-periods .btn-sm.active { background:var(--accent); }
.indicators-row { display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem; margin-top:0.5rem; }
.indicator-card { background:rgba(31,111,235,0.05); border-radius:6px; padding:0.5rem; text-align:center; }
.indicator-card .ind-val { font-size:1.1rem; font-weight:700; }
.indicator-card .ind-lbl { font-size:0.6rem; color:var(--muted); margin-top:0.15rem; }
.indicator-card .ind-sig { font-size:0.6rem; font-weight:600; margin-top:0.1rem; }

/* === PROFILE MODAL === */
.modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.75); z-index:200; justify-content:center; align-items:flex-start; padding-top:1.5rem; overflow-y:auto; }
.modal-overlay.open { display:flex; }
.modal { background:var(--card); border:1px solid var(--border); border-radius:12px; width:92%; max-width:940px; max-height:88vh; overflow-y:auto; margin-bottom:2rem; }
.modal-header { padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; position:sticky; top:0; background:var(--card); z-index:2; }
.modal-header .title-block h2 { font-size:1.3rem; }
.modal-header .ticker-display { font-size:0.78rem; color:var(--muted); }
.modal-close { background:none; border:none; color:var(--muted); font-size:1.5rem; cursor:pointer; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:1rem 1.5rem; }
.chart-container { margin:0 -0.5rem 1rem; position:relative; }
.profile-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:0.5rem; margin-bottom:1rem; }
.profile-stat { background:rgba(31,111,235,0.05); border-radius:8px; padding:0.6rem; text-align:center; }
.profile-stat .ps-val { font-size:1.1rem; font-weight:700; }
.profile-stat .ps-lbl { font-size:0.62rem; color:var(--muted); margin-top:0.1rem; }
.profile-section { margin-bottom:1rem; }
.profile-section h4 { font-size:0.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.6rem; padding-bottom:0.4rem; border-bottom:1px solid var(--border); }
.profile-section p, .profile-section li { font-size:0.8rem; color:var(--text); line-height:1.6; }
.analyst-note { padding:0.6rem 0.75rem; background:rgba(31,111,235,0.05); border-left:3px solid var(--accent); border-radius:4px; margin-bottom:0.4rem; font-size:0.75rem; }
.analyst-note .an-date { font-size:0.6rem; color:var(--muted); }
.analyst-note .an-author { font-size:0.6rem; color:var(--gold); }
.risk-badge { display:inline-block; padding:0.15rem 0.5rem; border-radius:4px; font-size:0.65rem; font-weight:700; }
.risk-high { background:rgba(248,81,73,0.15); color:var(--red); }
.risk-med { background:rgba(210,153,29,0.15); color:var(--gold); }
.risk-low { background:rgba(63,185,80,0.15); color:var(--green); }
.stance-badge { display:inline-block; padding:0.25rem 0.7rem; border-radius:4px; font-size:0.72rem; font-weight:700; margin:0.5rem 0; }
.stance-avoid { background:rgba(248,81,73,0.15); color:var(--red); }
.stance-hold { background:rgba(88,166,255,0.15); color:var(--blue); }
.stance-buy { background:rgba(63,185,80,0.15); color:var(--green); }
.stance-watch { background:rgba(210,153,29,0.15); color:var(--gold); }
.price-timeline { list-style:none; }
.price-timeline li { display:flex; gap:0.75rem; padding:0.35rem 0; border-bottom:1px solid var(--border); font-size:0.75rem; }
.price-timeline .pt-date { width:65px; font-weight:600; color:var(--muted); }
.price-timeline .pt-price { width:65px; text-align:right; }
.price-timeline .pt-event { flex:1; color:var(--muted); }
.risk-flag { background:rgba(248,81,73,0.07); border:1px solid rgba(248,81,73,0.2); border-radius:6px; padding:0.4rem 0.75rem; font-size:0.73rem; color:var(--red); margin-bottom:0.25rem; }

.analysis-section { margin:0 2rem 1rem; }
.analysis-section > h3 { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.5rem; }
.obs-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:0.7rem 1rem; margin-bottom:0.4rem; display:flex; gap:0.75rem; align-items:flex-start; }
.obs-card.watch { border-left:3px solid var(--blue); }
.obs-card.caution { border-left:3px solid var(--red); }
.obs-card.opportunity { border-left:3px solid var(--gold); }
.obs-badge { padding:0.1rem 0.4rem; border-radius:4px; font-size:0.6rem; font-weight:700; text-transform:uppercase; white-space:nowrap; min-width:55px; text-align:center; }
.badge-watch{ background:rgba(88,166,255,0.15); color:var(--blue); }
.badge-avoid{ background:rgba(248,81,73,0.15); color:var(--red); }
.badge-buy{ background:rgba(63,185,80,0.15); color:var(--green); }
.badge-opp{ background:rgba(210,153,29,0.15); color:var(--gold); }
.obs-content h4 { font-size:0.8rem; font-weight:600; margin-bottom:0.2rem; }
.obs-content p { font-size:0.73rem; color:var(--muted); line-height:1.5; }

.risk-flags { margin:0 2rem 1rem; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:0.4rem; }
.risk-flag { background:rgba(248,81,73,0.07); border:1px solid rgba(248,81,73,0.2); border-radius:6px; padding:0.5rem 0.75rem; font-size:0.75rem; color:var(--red); }

.bottom-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin:0 2rem 1rem; }
.card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:1rem; }
.card h3 { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.6rem; }
.note { font-size:0.72rem; color:var(--muted); margin-top:0.5rem; font-style:italic; }
.spotlight-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.4rem; text-align:center; }
.spotlight-day { padding:0.4rem; background:rgba(31,111,235,0.1); border-radius:6px; }
.spotlight-day .day { font-size:0.6rem; color:var(--muted); }
.spotlight-day .pct { font-size:1rem; font-weight:700; }
.spotlight-day .sector { font-size:0.55rem; color:var(--muted); }
.yield-table { width:100%; font-size:0.78rem; border-collapse:collapse; }
.yield-table td, .yield-table th { padding:0.3rem 0.4rem; text-align:right; border-bottom:1px solid var(--border); }
.yield-table th { color:var(--muted); font-weight:500; font-size:0.7rem; }
.yield-table td:first-child, .yield-table th:first-child { text-align:left; }
.disclaimer { margin:0 2rem 1rem; padding:0.6rem 1rem; background:rgba(139,148,158,0.03); border:1px solid var(--border); border-radius:6px; font-size:0.68rem; color:var(--muted); text-align:center; }
.footer { text-align:center; padding:0.75rem; color:var(--muted); font-size:0.7rem; border-top:1px solid var(--border); }
.spinner { text-align:center; padding:3rem; color:var(--muted); }

/* === NEWS === */
.news-section { margin:0 2rem 1rem; }
.news-section h3 { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.5rem; }
.news-filters { display:flex; gap:0.4rem; margin-bottom:0.6rem; }
.news-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:0.4rem; }
.news-item { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:0.65rem 0.85rem; }
.news-item:hover { border-color:var(--blue); }
.n-date { font-size:0.62rem; color:var(--muted); display:flex; align-items:center; gap:0.35rem; margin-bottom:0.25rem; }
.n-cat { font-size:0.55rem; font-weight:700; text-transform:uppercase; padding:0.08rem 0.3rem; border-radius:3px; }
.n-cat-Market { background:rgba(88,166,255,0.15); color:var(--blue); }
.n-cat-Macro { background:rgba(210,153,29,0.15); color:var(--gold); }
.n-cat-Corporate, .n-cat-Energy { background:rgba(63,185,80,0.15); color:var(--green); }
.n-cat-IPO { background:rgba(188,140,255,0.15); color:#bc8cff; }
.n-cat-Commodities, .n-cat-Mining { background:rgba(248,81,73,0.15); color:var(--red); }
.n-cat-Finance { background:rgba(255,165,0,0.15); color:#ffa500; }
.n-title { font-size:0.78rem; font-weight:600; margin-bottom:0.2rem; color:var(--text); }
.n-sum { font-size:0.7rem; color:var(--muted); line-height:1.4; margin-bottom:0.25rem; }
.n-ticker { display:inline-block; font-size:0.6rem; color:var(--gold); background:rgba(210,153,29,0.1); padding:0.05rem 0.3rem; border-radius:3px; margin:0 0.15rem; }
.n-source { font-size:0.6rem; color:var(--muted); }

/* === HEATMAP === */
.heatmap-section { margin:0 2rem 1rem; }
.heatmap-section h3 { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.4rem; }
.heatmap-legend { display:flex; align-items:center; gap:0.5rem; font-size:0.65rem; color:var(--muted); margin-bottom:0.4rem; }
.heatmap-gradient { width:120px; height:10px; border-radius:5px; background:linear-gradient(90deg,#f85149,#f0883e,#7ee787,#3fb950); }
.heatmap-wrap { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:0.5rem; display:flex; justify-content:center; }
.heatmap-wrap canvas { width:100%; max-width:900px; height:340px; }
</style>
</head>
<body>
<div class="header">
  <h1>
    <img class="logo-icon" src="/logo.png" alt="Baobab Capital" style="width:42px; height:42px; border-radius:8px;">
    <span class="logo-wordmark"><span class="baobab">BAOBAB</span> <span class="capital">CAPITAL</span><span class="tagline">African Markets Intelligence</span></span>
  </h1>
  <div class="controls">

<script>
let allData = {}, currentFilter = 'all', chartInst = null;

async function load() {
  try {
    const r = await fetch('/api/all');
    allData = await r.json();
    loadNews();
    render();
    document.getElementById('supd').textContent = allData.marketClose?.asOf || allData.market?.asOf || '';
  } catch(e) {
    document.getElementById('hero').innerHTML = '<div class="hero-card full-width" style="text-align:center;padding:2rem;"><p style="color:var(--muted);">⚠️ Server not reachable. Run: node server.js</p></div>';
  }
}

function render() {
  renderCurrency(); renderHero(); renderMovers(); renderSentiment(); renderCalendar();
  renderAnalysis(); renderRisks(); renderHeatmap(); renderNews(); renderTracker(); renderBottom();
  document.getElementById('disc').innerHTML = '⚖️ ' + (allData.marketClose?.analysis?.authorNote || 'This analysis is for informational purposes only. Not investment advice.');
}

function fmt(v){return v?.toLocaleString?.()||v||'—';}
function fmtM(v){return (v/1e6).toFixed(2)+'M';}

function renderCurrency() {
  const cu = allData.currency; if (!cu?.rates) return;
  const r = cu.rates;
  const getFlag = (c) => ({ USD:'🇺🇸', GBP:'🇬🇧', EUR:'🇪🇺', ZAR:'🇿🇦', BWP:'🇧🇼', CNY:'🇨🇳' }[c]||'💱');
  const getName = (c) => ({ USD:'US Dollar', GBP:'British Pound', EUR:'Euro', ZAR:'SA Rand', BWP:'Botswana Pula', CNY:'Chinese Yuan' }[c]||c);
  let items = '';
  for (const [code, data] of Object.entries(r)) {
    const trendClass = data.trend === 'appreciating' ? 'up' : data.trend === 'depreciating' ? 'down' : '';
    const trendSign = data.trend === 'appreciating' ? '▼' : data.trend === 'depreciating' ? '▲' : '—';
    const trendLabel = data.trend === 'appreciating' ? 'Kwacha ↑' : data.trend === 'depreciating' ? 'Kwacha ↓' : 'Stable';
    const wkChg = data.weekAgo ? ((data.mid - data.weekAgo) / data.weekAgo * 100).toFixed(1) : null;
    items += '<div class="currency-item"><div class="cc-flag">'+getFlag(code)+'</div><div class="cc-code">'+code+'/'+getName(code)+'</div><div class="cc-rate">K'+data.mid.toFixed(2)+'</div><div class="cc-move '+trendClass+'">'+trendSign+' '+trendLabel+(wkChg?' · '+wkChg+'% wk':'')+'</div></div>';
  }
  const kwacha = cu.trendAnalysis?.direction || '';
  const outlook = cu.trendAnalysis?.outlook || '';
  document.getElementById('currencyCard').innerHTML =
    '<div class="cc-header"><h3>💱 ZMW Exchange Rates</h3><span class="cc-source">BOZ · '+cu.asOf+'</span></div>' +
    '<div class="currency-grid">'+items+'</div>' +
    '<div class="currency-trend"><strong>'+kwacha+'</strong> · '+outlook.substring(0,180)+'…</div>';
}

function renderHero() {
  const mc = allData.marketClose?.marketClose; if (!mc) { document.getElementById('heroMarketClose').innerHTML = ''; return; }
  const condClass = mc.lasiChange>0?'condition-up':mc.lasiChange<0?'condition-down':'condition-flat';
  const ct = mc.lasiChange>0?'▲ UP':mc.lasiChange<0?'▼ DOWN':'— FLAT';
  let h = '<div class="label-row"><h3>📈 Market Close</h3><span class="date">'+allData.marketClose?.asOf+'</span></div>';
  h += '<div class="lasi">LASI '+mc.lasiIndex?.toLocaleString()+' <span class="condition '+condClass+'">'+ct+'</span></div>';
  h += '<div class="lasi-sub">'+(mc.lasiChange>0?'+':'')+mc.lasiChange+' ('+mc.lasiChangePct+'%) · '+(mc.sessionSummary||'')+'</div>';
  h += '<div class="stats-grid"><div class="stat-item"><div class="val">'+fmt(mc.totalTrades)+'</div><div class="lbl">Trades</div></div>';
  h += '<div class="stat-item"><div class="val">'+fmt(mc.totalVolume)+'</div><div class="lbl">Volume</div></div>';
  h += '<div class="stat-item"><div class="val" style="color:var(--gold);">ZMW '+fmtM(mc.totalValue)+'</div><div class="lbl">Value</div></div>';
  h += '<div class="stat-item"><div class="val" style="color:var(--green);">ZMW '+mc.marketCapTotal+mc.marketCapUnit+'</div><div class="lbl">Mkt Cap</div></div></div>';
  document.getElementById('heroMarketClose').innerHTML = h;
}

function renderMovers() {
  const gs = allData.marketClose?.gainers || [];
  const ds = allData.marketClose?.decliners || [];
  
  let g = '<div class="label-row"><h3>🟢 Gainers</h3></div>';
  if (gs.length) {
    gs.forEach(gi => { g += '<div class="mover-row"><span class="t" style="color:var(--green)">'+gi.ticker+'</span><span class="n">'+(gi.name||'')+'</span><span class="p">K'+gi.price+'</span><span class="c" style="color:var(--green)">+'+gi.change+'</span></div>'; });
  } else { g += '<div class="muted" style="font-size:0.72rem;padding:0.4rem 0;">No gainers today</div>'; }
  document.getElementById('heroGainers').innerHTML = g;
  
  let d = '<div class="label-row"><h3>🔴 Decliners</h3></div>';
  if (ds.length) {
    ds.forEach(di => { d += '<div class="mover-row"><span class="t" style="color:var(--red)">'+di.ticker+'</span><span class="n">'+(di.name||'')+'</span><span class="p">K'+di.price+'</span><span class="c" style="color:var(--red)">'+di.change+'</span></div>'; });
  } else { d += '<div class="muted" style="font-size:0.72rem;padding:0.4rem 0;">No decliners today</div>'; }
  document.getElementById('heroDecliners').innerHTML = d;
}

function renderSentiment() {
  // Calculate sentiment score from available data
  const cos = allData.companies || [];
  const gainers = cos.filter(c => (c.changePct||0) > 0).length;
  const losers = cos.filter(c => (c.changePct||0) < 0).length;
  const flat = cos.filter(c => (c.changePct||0) === 0).length;
  const total = cos.length || 1;
  // Score: 0=bear (all red), 100=bull (all green). Weighted: gainers and magnitude
  let score = 50;
  if (gainers + losers > 0) {
    const gPct = gainers / total * 100;
    const avgGain = cos.filter(c=>c.changePct>0).reduce((s,c)=>s+c.changePct,0) / Math.max(gainers,1);
    const avgLoss = cos.filter(c=>c.changePct<0).reduce((s,c)=>s+Math.abs(c.changePct),0) / Math.max(losers,1);
    score = 50 + (gainers - losers) * 3 + (avgGain - (avgLoss||0)) * 5;
    score = Math.max(5, Math.min(95, score));
  }
  let color, verdict, emoji;
  if (score >= 65) { color = 'var(--green)'; verdict = 'Bullish'; emoji = '🟢'; }
  else if (score >= 45) { color = 'var(--gold)'; verdict = 'Neutral'; emoji = '🟡'; }
  else { color = 'var(--red)'; verdict = 'Bearish'; emoji = '🔴'; }
  
  document.getElementById('sentimentMeter').innerHTML =
    '<h3>📊 Market Sentiment</h3>' +
    '<div class="sentiment-gauge"><div class="gauge-fill" style="width:'+score+'%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green));"></div></div>' +
    '<div class="sentiment-labels"><span>Bearish</span><span>Neutral</span><span>Bullish</span></div>' +
    '<div class="sentiment-score" style="color:'+color+';">'+emoji+' '+Math.round(score)+'/100</div>' +
    '<div class="sentiment-verdict" style="color:'+color+';">'+verdict+' · '+gainers+'▲ '+losers+'▼ '+flat+'─</div>';
}

function renderCalendar() {
  const c = allData.companies || [];
  // Build earnings/dividend calendar from company data
  let items = [];
  // Upcoming dividends (from companies with yield and ex-div dates in profiles)
  const divTickers = [
    { ticker:'BATZ', date:'Jun 17', type:'dividend', desc:'Final Dividend' },
    { ticker:'CHIL', date:'Jun 8', type:'earnings', desc:'Earnings Release' },
    { ticker:'BATA', date:'Jun 11', type:'earnings', desc:'Earnings Release' },
    { ticker:'ZMBF', date:'Jun 22', type:'earnings', desc:'Earnings Release' },
    { ticker:'AECI', date:'Jun 26', type:'earnings', desc:'Earnings Release' },
    { ticker:'SCBL', date:'Jul 24', type:'earnings', desc:'Earnings Release' },
    { ticker:'ZABR', date:'Aug 14', type:'earnings', desc:'Earnings Release' },
    { ticker:'ATEL', date:'Aug 20', type:'earnings', desc:'Earnings Release' },
  ];
  if (!items.length) items = divTickers;
  const dotCls = (t) => t==='earnings'?'earnings':t==='dividend'?'dividend':'event';
  const emoji = (t) => t==='earnings'?'📋':t==='dividend'?'💵':'📅';
  let html = '<h3>📅 Upcoming Events</h3>';
  items.forEach(i => {
    html += '<div class="cal-item"><div class="cal-dot '+dotCls(i.type)+'"></div><span class="cal-date">'+i.date+'</span><span class="cal-ticker">'+i.ticker+'</span><span class="cal-desc">'+emoji(i.type)+' '+i.desc+'</span></div>';
  });
  document.getElementById('earningsCalendar').innerHTML = html;
}

function renderAnalysis() {
  const a=allData.marketClose?.analysis; if(!a) return;
  let h='<h3>🧠 Market Analysis — '+a.marketCondition+'</h3><p style="font-size:0.78rem;color:var(--muted);margin-bottom:0.75rem;">'+a.marketConditionDetail+'</p>';
  (a.observations||[]).forEach(o=>{const cl=o.type==='caution'?'caution':o.type==='opportunity'?'opportunity':'watch';const bc=o.stance?.includes('AVOID')?'badge-avoid':o.stance?.includes('ACCUMULATE')?'badge-buy':o.stance?.includes('WATCH')||o.stance?.includes('PREPARE')?'badge-opp':'badge-watch';h+='<div class="obs-card '+cl+'"><div class="obs-badge '+bc+'">'+o.stance+'</div><div class="obs-content"><h4><span style="color:var(--accent);">'+o.ticker+'</span> '+o.title+'</h4><p>'+o.detail+'</p></div></div>';});
  document.getElementById('analysis').innerHTML=h;
}

function renderRisks(){const f=allData.marketClose?.analysis?.riskFlags||[];document.getElementById('risks').innerHTML=f.length?f.map(x=>'<div class="risk-flag">⚠️ '+x+'</div>').join(''):'';}

function renderTracker(filter) {
  if (filter) currentFilter = filter;
  let companies = allData.companies || [];
  if (currentFilter === 'gainers') companies = companies.filter(c => (c.changePct||0) > 0).sort((a,b)=>(b.changePct||0)-(a.changePct||0));
  else if (currentFilter === 'losers') companies = companies.filter(c => (c.changePct||0) < 0).sort((a,b)=>(a.changePct||0)-(b.changePct||0));
  else if (currentFilter === 'volume') companies = [...companies].sort((a,b)=>(b.volume||0)-(a.volume||0));
  else if (currentFilter === 'marketcap') companies = [...companies].sort((a,b)=>(b.marketCap||0)-(a.marketCap||0));
  document.getElementById('tickerTable').innerHTML = '<table><thead><tr><th>Ticker</th><th>Company</th><th>Sector</th><th class="num">Price</th><th class="num">Change</th><th class="num">Vol</th><th class="num">Mkt Cap</th><th class="num">Float</th><th class="num">P/E</th><th></th></tr></thead><tbody>' +
    companies.map(c => {
      const chCls = (c.changePct||0)>=0?'pos':'neg'; const volCls = !c.volume?'zero-vol':'';
      return '<tr class="'+volCls+'" onclick="openProfile(\''+c.ticker+'\')"><td><span class="ticker-link">'+c.ticker+'</span></td><td>'+c.name+'</td><td class="muted">'+(c.subSector||c.sector)+'</td><td class="num">K'+(c.price?.toFixed(2)||'—')+'</td><td class="num '+chCls+'">'+(c.changePct>=0?'+':'')+(c.changePct?.toFixed(2)||'0.00')+'%</td><td class="num muted '+volCls+'">'+(c.volume?fmt(c.volume):'—')+'</td><td class="num muted">'+(c.marketCap?'K'+(c.marketCap/1e9).toFixed(1)+'B':'—')+'</td><td class="num muted">'+(c.freeFloat||'—')+'%</td><td class="num muted">'+(c.pe?.toFixed(1)||'—')+'</td><td><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openProfile(\''+c.ticker+'\')">→</button></td></tr>';
    }).join('') + '</tbody></table>';
}

function filterTracker(f, btn) { document.querySelectorAll('.filters .btn-sm').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderTracker(f); }

// ====== CHART ======
let chartPeriod = 90;

function computeMA(data, period) {
  const result = []; for (let i=0; i<data.length; i++) { if (i<period-1) {result.push(null); continue;} let sum=0; for (let j=i-period+1; j<=i; j++) sum+=data[j].close; result.push(Math.round(sum/period*100)/100); } return result;
}

function computeRSI(data, period = 14) {
  const rsi = []; if (data.length < period+1) return rsi;
  let gains=0, losses=0;
  for (let i=1; i<=period; i++) { const diff=data[i].close-data[i-1].close; if(diff>=0) gains+=diff; else losses-=diff; }
  let avgGain=gains/period, avgLoss=losses/period;
  rsi.push(null); for (let i=1;i<period;i++) rsi.push(null);
  rsi.push(avgLoss===0?100:Math.round((100-100/(1+avgGain/avgLoss))*100)/100);
  for (let i=period+1; i<data.length; i++) { const diff=data[i].close-data[i-1].close; avgGain=(avgGain*13+(diff>0?diff:0))/14; avgLoss=(avgLoss*13+(diff<0?-diff:0))/14; rsi.push(avgLoss===0?100:Math.round((100-100/(1+avgGain/avgLoss))*100)/100); }
  return rsi;
}

async function renderChart(ticker) {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  try {
    const r = await fetch('/api/company/' + ticker + '/ohlcv');
    const ohlcv = await r.json();
    if (!ohlcv.data || ohlcv.data.length < 5) { document.getElementById('chartDiv').innerHTML='<div style="text-align:center;padding:2rem;color:var(--muted);">No chart data for '+ticker+'</div>'; return; }
    
    let data = ohlcv.data;
    if (chartPeriod === 30) data = data.slice(-Math.min(30, data.length));
    else if (chartPeriod === 60) data = data.slice(-Math.min(60, data.length));
    
    const labels = data.map(d=>d.date.slice(5));
    const closes = data.map(d=>d.close);
    const volumes = data.map(d=>d.volume);
    const ma7 = computeMA(data,7), ma21 = computeMA(data,21);
    const rsiVals = computeRSI(data,14);
    
    // Price colors
    const upColor = '#3fb950', downColor = '#f85149';
    const barColors = data.map((d,i)=>i===0?upColor:(d.close>=data[i-1].close?upColor:downColor));
    
    const ctx = document.getElementById('chartCanvas').getContext('2d');
    chartInst = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label:'Close', data:closes, borderColor:'#58a6ff', borderWidth:1.5, pointRadius:0, tension:0.1, order:1, yAxisID:'y' },
          { label:'MA 7', data:ma7, borderColor:'#d2991d', borderWidth:1, pointRadius:0, tension:0.1, order:2, yAxisID:'y' },
          { label:'MA 21', data:ma21, borderColor:'#8b949e', borderWidth:1, pointRadius:0, tension:0.1, order:2, yAxisID:'y', borderDash:[4,2] },
          { label:'Volume', data:volumes, backgroundColor:barColors.map(c=>c+'44'), borderColor:barColors.map(c=>c+'88'), borderWidth:0.5, type:'bar', order:3, yAxisID:'y1' }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{intersect:false,mode:'index'},
        plugins:{legend:{display:true,position:'top',labels:{color:'#8b949e',font:{size:10},usePointStyle:true,padding:15,boxWidth:8}},tooltip:{backgroundColor:'#161b22',titleColor:'#c9d1d9',bodyColor:'#8b949e',borderColor:'#30363d',borderWidth:1}},
        scales:{
          x:{ticks:{color:'#484f58',font:{size:9},maxTicksLimit:12},grid:{color:'#21262d'}},
          y:{position:'right',ticks:{color:'#8b949e',font:{size:9},callback:v=>'K'+v.toFixed(2)},grid:{color:'#21262d'}},
          y1:{position:'left',ticks:{color:'#484f58',font:{size:8},callback:v=>v>1000?'K'+(v/1000).toFixed(1):v},grid:{display:false}}
        }
      }
    });
    
    // Render indicators
    const lastClose = closes[closes.length-1];
    const ma7Last = ma7[ma7.length-1];
    const ma21Last = ma21[ma21.length-1];
    const rsiLast = rsiVals[rsiVals.length-1];
    const signal7v21 = ma7Last && ma21Last ? (ma7Last > ma21Last ? '🟢 Bullish (MA7 > MA21)' : '🔴 Bearish (MA7 < MA21)') : '—';
    const rsiSignal = rsiLast > 70 ? '🔴 Overbought' : rsiLast < 30 ? '🟢 Oversold' : '— Neutral';
    const trendSignal = lastClose > ma21Last ? '🟢 Above MA21' : '🔴 Below MA21';
    
    document.getElementById('indicatorsDiv').innerHTML =
      '<div class="indicator-card"><div class="ind-val">'+lastClose+'</div><div class="ind-lbl">Last Close</div></div>' +
      '<div class="indicator-card"><div class="ind-val" style="color:'+(ma7Last>ma21Last?'var(--green)':'var(--red)')+';">'+(ma7Last||'—')+'</div><div class="ind-lbl">MA7 / MA21</div><div class="ind-sig">'+signal7v21+'</div></div>' +
      '<div class="indicator-card"><div class="ind-val" style="color:'+(rsiLast>70?'var(--red)':rsiLast<30?'var(--green)':'var(--muted)')+';">'+(rsiLast||'—')+'</div><div class="ind-lbl">RSI (14)</div><div class="ind-sig">'+rsiSignal+'</div></div>' +
      '<div class="indicator-card"><div class="ind-val">K'+fmtM(data[data.length-1].volume*1000)+'</div><div class="ind-lbl">Latest Volume</div></div>' +
      '<div class="indicator-card"><div class="ind-val" style="color:var(--muted);">'+(Math.round((lastClose - data[0].close)/data[0].close*10000)/100)+'%</div><div class="ind-lbl">Period Return</div></div>' +
      '<div class="indicator-card"><div class="ind-val" style="color:var(--muted);">'+trendSignal.split(' ')[0]+'</div><div class="ind-lbl">Trend vs MA21</div><div class="ind-sig">'+trendSignal+'</div></div>';
    
    // Event markers on chart
    data.forEach((d,i)=>{if(d.event){chartInst.data.labels[i] = '⚡ '+chartInst.data.labels[i];}});
    chartInst.update();
  } catch(e) { console.error('Chart error:',e); }
}

function setChartPeriod(p,btn) {
  chartPeriod = p;
  document.querySelectorAll('.chart-periods .btn-sm').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const ticker = document.getElementById('modalContent').dataset?.ticker;
  if (ticker) renderChart(ticker);
}

// ====== PROFILE MODAL ======
async function openProfile(ticker) {
  document.getElementById('modal').classList.add('open');
  document.getElementById('modalContent').innerHTML = '<div class="spinner" style="padding:3rem;">Loading '+ticker+'...</div>';
  try {
    const [pr,cr] = await Promise.all([fetch('/api/company/'+ticker), fetch('/api/company/'+ticker+'/ohlcv')]);
    const p = await pr.json(); const ohlcv = await cr.json();
    document.getElementById('modalContent').dataset.ticker = ticker;
    renderProfile(p, ohlcv);
    if (ohlcv.data?.length) { renderChart(ticker); }
  } catch(e) { document.getElementById('modalContent').innerHTML='<div class="spinner">Failed to load profile.</div>'; }
}

function closeModal(){document.getElementById('modal').classList.remove('open');if(chartInst){chartInst.destroy();chartInst=null;}}

function renderProfile(p, ohlcv) {
  if (!p.financials && !p.description) { document.getElementById('modalContent').innerHTML='<div class="modal-header"><div class="title-block"><h2>'+(p.name||p.ticker)+'</h2><div class="ticker-display">'+p.ticker+'</div></div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><p class="muted">Full profile not yet available.</p></div>'; return; }
  
  // Fallback data from companies.json live market data
  const co = (allData.companies||[]).find(c => c.ticker === p.ticker) || {};
  
  const riskCls = (p.riskRating||'').includes('HIGH')?'risk-high':(p.riskRating||'').includes('MED')?'risk-med':'risk-low';
  const stanceCls = (p.stance||'').includes('AVOID')?'stance-avoid':(p.stance||'').includes('HOLD')?'stance-hold':(p.stance||'').includes('BUY')||(p.stance||'').includes('ACCUMULATE')?'stance-buy':'stance-watch';
  
  // Build metrics from ALL available sources: profile + companies.json
  const lastPrice = p.priceHistory?.current?.price || p.priceHistory?.recent?.price || co.price || null;
  const grossMargin = p.financials?.grossMargin ?? p.financials?.grossMargin2025 ?? null;
  const peVal = p.ratios?.pe ?? co.pe ?? null;
  const divYield = p.dividend?.yield ?? co.dividendYield ?? p.ratios?.dividendYield ?? null;
  const freeFloat = p.ownership?.freeFloat ?? p.ownership?.float ?? co.freeFloat ?? null;
  const mktCap = co.marketCap ?? null;
  
  let h = '<div class="modal-header"><div class="title-block"><h2>'+p.name+'</h2><div class="ticker-display">'+p.ticker+' · '+p.sector+' · '+p.market+' · Risk: <span class="risk-badge '+riskCls+'">'+(p.riskRating||'NR')+'</span></div></div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body">';
  
  // Key metrics row
  h += '<div class="profile-grid">';
  h += '<div class="profile-stat"><div class="ps-val">'+(lastPrice?'K'+lastPrice:'—')+'</div><div class="ps-lbl">Last Price</div></div>';
  h += '<div class="profile-stat"><div class="ps-val">'+(grossMargin!=null?grossMargin+'%':'—')+'</div><div class="ps-lbl">Gross Margin</div></div>';
  h += '<div class="profile-stat"><div class="ps-val">'+(peVal!=null?peVal:'—')+'</div><div class="ps-lbl">P/E</div></div>';
  h += '<div class="profile-stat"><div class="ps-val">'+(divYield!=null?divYield+'%':'—')+'</div><div class="ps-lbl">Div Yield</div></div>';
  h += '<div class="profile-stat"><div class="ps-val">'+(freeFloat!=null?freeFloat+'%':'—')+'</div><div class="ps-lbl">Free Float</div></div>';
  h += '<div class="profile-stat"><div class="ps-val">'+(mktCap?'K'+(mktCap/1e9).toFixed(1)+'B':'—')+'</div><div class="ps-lbl">Market Cap</div></div>';
  h += '</div>';
  
  if (p.stance) h += '<div class="stance-badge '+stanceCls+'">📌 '+p.stance+'</div>';
  
  // CHART
  h += '<div class="chart-periods"><span style="font-size:0.7rem;color:var(--muted);margin-right:0.5rem;">📈 '+(ohlcv?.data?.length||0)+' trading days</span>';
  h += '<button class="btn btn-sm active" onclick="setChartPeriod(90,this)">3M</button>';
  h += '<button class="btn btn-sm btn-outline" onclick="setChartPeriod(60,this)">2M</button>';
  h += '<button class="btn btn-sm btn-outline" onclick="setChartPeriod(30,this)">1M</button>';
  h += '</div>';
  h += '<div class="chart-wrap"><canvas id="chartCanvas"></canvas></div>';
  h += '<div class="indicators-row" id="indicatorsDiv"></div>';
  
  // About
  if (p.description) h += '<div class="profile-section"><h4>About</h4><p>'+p.description+'</p></div>';
  
  // Price Timeline
  if (p.priceHistory?.priceTimeline) { h += '<div class="profile-section"><h4>Key Events</h4><ul class="price-timeline">'; p.priceHistory.priceTimeline.forEach(pt=>{h+='<li><span class="pt-date">'+pt.date+'</span><span class="pt-price">K'+pt.price+'</span><span class="pt-event">'+pt.event+'</span></li>';}); h+='</ul></div>'; }
  
  // Analyst Notes
  if (p.analystNotes?.length) { h += '<div class="profile-section"><h4>Analyst Notes</h4>'; p.analystNotes.forEach(n=>{h+='<div class="analyst-note"><div class="an-date">'+n.date+' · <span class="an-author">'+n.author+'</span></div><p style="margin-top:0.2rem;">'+n.note+'</p></div>';}); h+='</div>'; }
  
  // Risk Factors
  if (p.riskFactors?.length) { h += '<div class="profile-section"><h4>Risk Factors</h4>'; p.riskFactors.forEach(rf=>h+='<div class="risk-flag">⚠️ '+rf+'</div>'); h+='</div>'; }
  
  // Investment Thesis
  if (p.investmentThesis) h += '<div class="profile-section"><h4>Investment Thesis</h4><p>'+p.investmentThesis+'</p></div>';
  
  // Ownership
  if (p.ownership?.topHolders) { h += '<div class="profile-section"><h4>Ownership</h4>'; p.ownership.topHolders.forEach(oh=>{h+='<div class="mover-row"><span class="n">'+oh.name+'</span><span class="p" style="font-weight:600;">'+oh.stake+'%</span></div>';}); h+='</div>'; }
  
  h += '</div>';
  document.getElementById('modalContent').innerHTML = h;
}


// ====== HEATMAP ======
function renderHeatmap() {
  const companies = allData.companies || [];
  if (!companies.length) return;
  
  const list = companies.filter(c => c.marketCap && c.price > 0).sort((a,b) => b.marketCap - a.marketCap);
  if (!list.length) return;
  
  const canvas = document.getElementById('heatmapCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  
  const W = 900, H = 340;
  canvas.width = W; canvas.height = H;
  canvas.style.cursor = 'default';
  
  const cols = 5;
  const rows = Math.ceil(list.length / cols);
  const cw = W / cols;
  const ch = H / rows;
  
  // Store cell data for tooltip
  const cells = [];
  
  list.forEach((c, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const sx = col * cw;
    const sy = row * ch;
    const pct = c.changePct || 0;
    let color;
    if (pct >= 0.5) color = '#3fb950';
    else if (pct >= 0) color = '#7ee787';
    else if (pct >= -0.5) color = '#f0883e';
    else color = '#f85149';
    
    const alpha = Math.min(0.85, 0.25 + Math.abs(pct) * 0.9);
    ctx.fillStyle = color + Math.round(alpha * 255).toString(16).padStart(2,'0');
    ctx.fillRect(sx+1, sy+1, cw-3, ch-3);
    
    cells.push({ sx: sx+1, sy: sy+1, w: cw-3, h: ch-3, ticker: c.ticker, pct: pct, mcap: c.marketCap, name: c.name });
    
    // Only show labels if cell is large enough
    if (ch > 18 && cw > 65) {
      ctx.fillStyle = '#c9d1d9';
      ctx.font = 'bold ' + Math.min(11, ch/3) + 'px -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(c.ticker, sx+6, sy+ch/2+1);
      
      if (cw > 90) {
        ctx.fillStyle = '#a8b2bd';
        ctx.font = Math.min(9, ch/4) + 'px -apple-system, sans-serif';
        const chgStr = (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%';
        ctx.textAlign = 'right';
        ctx.fillText(chgStr, sx+cw-8, sy+ch/2+1);
        ctx.textAlign = 'left';
      }
    }
  });
  
  // Hover tooltip
  canvas.onmousemove = function(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    
    let found = null;
    for (const cell of cells) {
      if (mx >= cell.sx && mx <= cell.sx + cell.w && my >= cell.sy && my <= cell.sy + cell.h) {
        found = cell; break;
      }
    }
    
    if (found) {
      canvas.style.cursor = 'pointer';
      canvas.title = found.ticker + ' | ' + found.name + ' | ' + (found.pct>=0?'+':'') + found.pct.toFixed(2) + '% | Mkt Cap: K' + (found.mcap/1e9).toFixed(1) + 'B';
    } else {
      canvas.style.cursor = 'default';
      canvas.title = '';
    }
  };
  
  canvas.onclick = function(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    for (const cell of cells) {
      if (mx >= cell.sx && mx <= cell.sx + cell.w && my >= cell.sy && my <= cell.sy + cell.h) {
        openProfile(cell.ticker); return;
      }
    }
  };
}

// ====== TICKER ======
function renderTicker(items) {
  const track = document.getElementById('tickerTrack');
  if (!items.length) { track.innerHTML = '<span class="ticker-item">No recent news — check back after market hours.</span>'; return; }
  // Duplicate for seamless scroll
  const html = items.slice(0, 12).map(n => {
    const catClass = 'tcat-' + (n.category || 'market').toLowerCase();
    const tickers = n.tickers?.length ? ' ' + n.tickers.map(t => '#' + t).join(' ') : '';
    return '<span class="ticker-item"><span class="t-cat '+catClass+'">'+(n.category||'NEWS')+'</span>'+n.title+'<span class="t-tickers">'+tickers+'</span><span class="ticker-time">'+n.date+'</span></span>';
  }).join('');
  track.innerHTML = html + html; // duplicate for seamless loop
}

// ====== NEWS ======
let newsData = [], newsFilter = 'all';

async function loadNews() {
  try {
    const r = await fetch('/api/news');
    newsData = await r.json();
    renderTicker(newsData);
    renderNews();
  } catch(e) {}
}

function filterNews(cat, btn) {
  newsFilter = cat;
  document.querySelectorAll('.news-filters .btn-sm').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNews();
}

function renderNews() {
  let items = newsData;
  if (newsFilter !== 'all') items = items.filter(n => n.category === newsFilter);
  document.getElementById('newsList').innerHTML = items.map(n => 
    '<div class="news-item"><div class="n-date">' + n.date + '<span class="n-cat n-cat-' + n.category + '">' + n.category + '</span></div>' +
    '<div class="n-title">' + n.title + '</div>' +
    '<div class="n-sum">' + n.summary + (n.tickers?.length ? ' ' + n.tickers.map(t => '<span class="n-ticker">' + t + '</span>').join('') : '') + '</div>' +
    '<div class="n-source">' + n.source + '</div></div>'
  ).join('');
}

function renderBottom() {
  const sd = allData.market?.spotlightData;
  let s = '<div class="card"><h3>🔦 Spotlight Tracker</h3>';
  if(sd){s+='<div class="spotlight-grid">';sd.dates.forEach((d,i)=>{s+='<div class="spotlight-day"><div class="day">'+d+'</div><div class="pct" style="color:var(--gold)">'+sd.turnoverShare[i]+'%</div><div class="sector">'+sd.tickers[i]+'·'+sd.sectors[i]+'</div></div>';});s+='</div><div class="note">📌 "Traveling circus" — liquidity concentrates on one stock per day.</div>';}s+='</div>';
  const b = allData.bonds; let bd = '<div class="card"><h3>📜 Bond Yields</h3>';
  if(b?.auctions?.length){bd+='<table class="yield-table"><tr><th>Tenor</th><th>Jan 23</th><th>Feb 13</th><th>Δ</th></tr>';['2yr','5yr','7yr','10yr','15yr'].forEach(t=>{const j=b.auctions[0].yields[t],f=b.auctions[1]?.yields[t];if(j!=null&&f!=null){const d=(f-j).toFixed(0);bd+='<tr><td>'+t.replace('yr','-Year')+'</td><td>'+j.toFixed(2)+'%</td><td>'+f.toFixed(2)+'%</td><td style="color:'+(d<0?'var(--green)':'var(--red)')+'">'+(d>0?'+':'')+d+' bps</td></tr>';}});bd+='</table>';}bd+='</div>';
  document.getElementById('bottom').innerHTML = s+bd;
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
load(); setInterval(load,300000);
